name: service-build
description: Shared build, version-tag, and push steps for service images
inputs:
  image_name:
    description: Image name suffix under ghcr.io/<repo>/
    required: true
  dockerfile:
    description: Path to the Dockerfile
    required: true
  build_context:
    description: Docker build context
    required: false
    default: .
  release_type:
    description: Version bump type for manual dispatch
    required: false
    default: patch
  build_args:
    description: Optional multiline build args
    required: false
    default: ""
  hestia_api_key:
    description: Optional Hestia API key for Helios frontend builds
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Create release tag
      id: release_tag
      if: ${{ github.event_name == 'workflow_dispatch' }}
      shell: bash
      run: |
        git fetch --tags --force

        latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
        if [[ -z "$latest_tag" ]]; then
          latest_tag="v0.0.0"
        fi

        version=${latest_tag#v}
        IFS='.' read -r major minor patch <<< "$version"

        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}

        case "${{ inputs.release_type }}" in
          major)
            major=$((major + 1))
            minor=0
            patch=0
            ;;
          minor)
            minor=$((minor + 1))
            patch=0
            ;;
          patch)
            patch=$((patch + 1))
            ;;
          *)
            echo "Unsupported release type: ${{ inputs.release_type }}" >&2
            exit 1
            ;;
        esac

        new_tag="v${major}.${minor}.${patch}"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag "$new_tag"
        git push origin "$new_tag"

        echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
        echo "version=${new_tag#v}" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/${{ inputs.image_name }}
        tags: |
          type=raw,value=${{ steps.release_tag.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          type=raw,value=${{ steps.release_tag.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
          type=ref,event=tag,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=match,pattern=v(.*),group=1,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.build_context }}
        file: ${{ inputs.dockerfile }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          ${{ inputs.build_args }}
          ${{ inputs.hestia_api_key != '' && format('VITE_HESTIA_API_KEY={0}', inputs.hestia_api_key) || '' }}
