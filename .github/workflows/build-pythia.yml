name: Build and Push pythia

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump for release tag"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "shared/**"
      - "services/pythia/**"
      - ".github/workflows/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/pythia

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=src:../.. python -m pytest tests/ -v --tb=short

  build:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and push
        uses: ./.github/actions/service-build
        with:
          image_name: pythia
          dockerfile: services/pythia/Dockerfile
          build_context: services/pythia
          release_type: ${{ github.event.inputs.release_type || 'patch' }}
