name: Build and Push Micro-Army Images

on:
  push:
    branches: ['main']
    paths:
      - 'services/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (e.g. hestia)'
        required: true
        type: string
      release_type:
        description: 'Version bump for release tag'
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: read
  packages: write

jobs:
  find-changed:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed services
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "services=[\"${{ github.event.inputs.service }}\"]" >> "$GITHUB_OUTPUT"
          else
            changed=$(git diff --name-only origin/main...HEAD -- services/ | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
            echo "services=$changed" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: find-changed
    if: ${{ needs.find-changed.outputs.services != '[]' && needs.find-changed.outputs.services != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.find-changed.outputs.services) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build and push
        uses: ./.github/actions/service-build
        with:
          image_name: ${{ matrix.service }}
          dockerfile: services/${{ matrix.service }}/Dockerfile
          build_context: .
          release_type: ${{ github.event.inputs.release_type || 'patch' }}
