name: Build and Push arch

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump for release tag"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "services/arch/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and push
        uses: ./.github/actions/service-build
        with:
          image_name: arch
          dockerfile: services/arch/Dockerfile
          build_context: .
          release_type: ${{ github.event.inputs.release_type || 'patch' }}
