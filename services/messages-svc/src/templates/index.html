<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Complete Automate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .toast { transition: opacity 0.3s ease; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-lg">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white mb-2">Send a Message</h1>
      <p class="text-gray-400 text-sm">We'll get back to you as soon as possible.</p>
    </div>

    <!-- Form -->
    <form id="messageForm" class="space-y-5" novalidate>
      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Name</label>
        <input type="text" id="name" name="name" required
               class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100
                      placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      transition">
        <p class="text-red-400 text-xs mt-1 hidden" id="nameError">Please enter your name.</p>
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
        <input type="email" id="email" name="email" required
               class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100
                      placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      transition">
        <p class="text-red-400 text-xs mt-1 hidden" id="emailError">Please enter a valid email address.</p>
      </div>

      <!-- Subject -->
      <div>
        <label for="subject" class="block text-sm font-medium text-gray-300 mb-1">Subject</label>
        <input type="text" id="subject" name="subject" required
               class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100
                      placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      transition">
        <p class="text-red-400 text-xs mt-1 hidden" id="subjectError">Please enter a subject.</p>
      </div>

      <!-- Message -->
      <div>
        <label for="message" class="block text-sm font-medium text-gray-300 mb-1">Message</label>
        <textarea id="message" name="message" rows="5" required
                  class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100
                         placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                         transition resize-none"></textarea>
        <p class="text-red-400 text-xs mt-1 hidden" id="messageError">Please enter your message.</p>
      </div>

      <!-- Submit -->
      <button type="submit" id="submitBtn"
              class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg
                     transition focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2
                     focus:ring-offset-gray-950 disabled:opacity-50 disabled:cursor-not-allowed">
        Send Message
      </button>
    </form>

    <!-- Toast -->
    <div id="toast" class="toast fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-lg text-white text-sm font-medium
                          opacity-0 pointer-events-none max-w-sm"></div>

  </div>

  <script>
    const form = document.getElementById('messageForm');
    const toast = document.getElementById('toast');
    const submitBtn = document.getElementById('submitBtn');

    const fieldErrors = {
      name: document.getElementById('nameError'),
      email: document.getElementById('emailError'),
      subject: document.getElementById('subjectError'),
      message: document.getElementById('messageError'),
    };

    // --- Validation ---
    function validateField(id) {
      const el = document.getElementById(id);
      const err = fieldErrors[id];
      if (!el || !err) return true;
      if (!el.value.trim()) {
        err.classList.remove('hidden');
        el.classList.add('border-red-500', 'focus:ring-red-500');
        return false;
      }
      if (id === 'email') {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!re.test(el.value.trim())) {
          err.textContent = 'Please enter a valid email address.';
          err.classList.remove('hidden');
          el.classList.add('border-red-500', 'focus:ring-red-500');
          return false;
        }
      }
      err.classList.add('hidden');
      el.classList.remove('border-red-500', 'focus:ring-red-500');
      el.classList.add('border-gray-700');
      return true;
    }

    ['name', 'email', 'subject', 'message'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => validateField(id));
      document.getElementById(id).addEventListener('blur', () => validateField(id));
    });

    // --- Toast ---
    function showToast(message, type) {
      toast.textContent = message;
      toast.className = `toast fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-lg text-white text-sm font-medium opacity-100 pointer-events-auto max-w-sm ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
      setTimeout(() => {
        toast.classList.remove('opacity-100', 'pointer-events-auto');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 5000);
    }

    // --- Submit ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Validate all fields
      const allValid = ['name', 'email', 'subject', 'message'].every(id => validateField(id));
      if (!allValid) return;

      const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        subject: document.getElementById('subject').value.trim(),
        message: document.getElementById('message').value.trim(),
      };

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const resp = await fetch('/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (resp.ok) {
          showToast('Message sent successfully! We\'ll be in touch soon.', 'success');
          form.reset();
          [name, email, subject, message].forEach(el => {
            el.classList.remove('border-red-500');
            el.classList.add('border-gray-700');
          });
        } else {
          const err = await resp.json().catch(() => ({}));
          showToast(err.detail || `Error ${resp.status}: Failed to send message.`, 'error');
        }
      } catch (err) {
        showToast('Network error. Please check your connection and try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
