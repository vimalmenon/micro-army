apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: azure-quiz
  namespace: azure-quiz
spec:
  ingressClassName: traefik
  rules:
  - host: azure.completeautomate.com
    http:
      paths:
      - backend:
          service:
            name: azure-quiz
            port:
              number: 80
        path: /
        pathType: Prefix
